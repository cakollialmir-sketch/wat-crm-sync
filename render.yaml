services:
  - type: web
    name: wat-crm-sync
    runtime: python
    buildCommand: pip install -r requirements-server.txt
    startCommand: uvicorn webhook_server:app --host 0.0.0.0 --port $PORT
    healthCheckPath: /health
    envVars:
      # GoHighLevel
      - key: GHL_API_TOKEN
        sync: false
      - key: GHL_LOCATION_ID
        sync: false
      - key: GHL_PIPELINE_ID
        sync: false
      - key: GHL_CALENDAR_ID
        sync: false
      - key: GHL_CONFIRMATION_WORKFLOW_ID
        sync: false
      # Pipeline stage IDs (existing)
      - key: GHL_STAGE_NO_ANSWER
        sync: false
      - key: GHL_STAGE_VOICEMAIL
        sync: false
      - key: GHL_STAGE_CALLBACK
        sync: false
      - key: GHL_STAGE_APPT_SET
        sync: false
      - key: GHL_STAGE_NOT_INTERESTED
        sync: false
      # Pipeline stage IDs (new)
      - key: GHL_STAGE_DEMO_SENT
        value: 70e694e4-f2e7-42c4-843a-8f463ef8c728
      - key: GHL_STAGE_NEW_LEAD
        sync: false
      - key: GHL_STAGE_SENT_TO_DIALER
        sync: false
      - key: GHL_STAGE_NO_SHOW
        sync: false
      - key: GHL_STAGE_DEMO_COMPLETED
        sync: false
      - key: GHL_STAGE_CLOSED_WON
        sync: false
      - key: GHL_STAGE_DNC
        sync: false
      # Workflow IDs (new)
      - key: GHL_NO_SHOW_WORKFLOW_ID
        sync: false
      - key: GHL_CLOSED_WON_WORKFLOW_ID
        sync: false
      # Webhook secrets
      - key: CALLTOOLS_WEBHOOK_SECRET
        sync: false
      - key: CALENDLY_WEBHOOK_SECRET
        sync: false
      - key: ZOOM_WEBHOOK_SECRET
        sync: false
      # Calendly API
      - key: CALENDLY_API_TOKEN
        sync: false
