name: Keep Render Alive

on:
  schedule:
    # Ping every 10 minutes to prevent Render free tier cold start (spins down after 15 min inactivity)
    - cron: '*/10 * * * *'
  workflow_dispatch: {}

jobs:
  ping:
    runs-on: ubuntu-latest
    steps:
      - name: Ping health endpoint
        run: |
          STATUS=$(curl -s -o /dev/null -w "%{http_code}" --max-time 30 https://wat-crm-sync.onrender.com/health)
          echo "Health check status: $STATUS"
          if [ "$STATUS" != "200" ]; then
            echo "Warning: health check returned $STATUS"
            exit 1
          fi
